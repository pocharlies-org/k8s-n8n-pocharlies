name: Update n8n version

# Checks hub.docker.com weekly; opens a PR when a new semver release is out.

on:
  schedule:
    - cron: '0 7 * * 1'   # Monday 07:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve latest stable n8n tag
        id: ver
        run: |
          python3 - <<'PYEOF'
          import urllib.request, json, re, os

          # n8n publishes to docker.n8n.io but Docker Hub has the tag list
          url = "https://hub.docker.com/v2/repositories/n8nio/n8n/tags?page_size=100&ordering=last_updated"
          with urllib.request.urlopen(url) as r:
              data = json.loads(r.read())

          semver_re = re.compile(r'^(\d+)\.(\d+)\.(\d+)$')
          tags = [t["name"] for t in data["results"] if semver_re.match(t["name"])]
          tags.sort(key=lambda v: tuple(int(x) for x in v.split(".")), reverse=True)
          latest = tags[0] if tags else None

          # Read current tag from manifest
          with open("k8s/manifest.yaml") as f:
              content = f.read()
          m = re.search(r'image: docker\.n8n\.io/n8nio/n8n:(.+)', content)
          current = m.group(1) if m else "unknown"

          print(f"Current: {current}  Latest: {latest}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"latest={latest}\n")
              out.write(f"current={current}\n")
              out.write(f"changed={'true' if latest and latest != current else 'false'}\n")
          PYEOF

      - name: Update manifest
        if: steps.ver.outputs.changed == 'true'
        run: |
          sed -i "s|image: docker.n8n.io/n8nio/n8n:.*|image: docker.n8n.io/n8nio/n8n:${{ steps.ver.outputs.latest }}|g" k8s/manifest.yaml

      - name: Open PR
        if: steps.ver.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: update/n8n-${{ steps.ver.outputs.latest }}
          commit-message: "chore: update n8n ${{ steps.ver.outputs.current }} → ${{ steps.ver.outputs.latest }}"
          title: "chore: update n8n ${{ steps.ver.outputs.current }} → ${{ steps.ver.outputs.latest }}"
          body: |
            Automated update of n8n image tag.

            - **From:** `${{ steps.ver.outputs.current }}`
            - **To:** `${{ steps.ver.outputs.latest }}`

            [n8n releases](https://github.com/n8n-io/n8n/releases)
          labels: dependencies
          delete-branch: true
